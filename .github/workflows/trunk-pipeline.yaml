name: Trunk Pipeline
on:
  push:
    branches:
      - main

jobs:
  pipeline:
    strategy:
      matrix:
        os: ['ubuntu-slim']
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v7
      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.72.0
          cache: true
      - name: Run linter check
        run: pixi run lint
