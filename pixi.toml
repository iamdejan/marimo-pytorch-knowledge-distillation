[workspace]
authors = ["Giovanni Dejan <giovanni.dejan@binus.ac.id>"]
channels = ["conda-forge"]
name = "python-pixi-template"
platforms = [{ name = "default", platform = "linux-64", cuda = "12.9" }, { name = "cicd", platform = "linux-64" }]
version = "0.1.0"

[tasks]
start = "marimo edit --headless --port 3000"
lint = "marimo check --ignore-scripts ."
lint-fix = "marimo check --ignore-scripts --fix ."

[dependencies]
marimo = ">=0.23.1,<0.24"
python = ">=3.13,<3.14"
numpy = ">=2.0.0,<3"
nbformat = ">=5.10.4,<6"
ruff = ">=0.15.5,<0.16"
pre-commit = ">=4.5.1,<5"
ty = ">=0.0.56,<0.0.57"
nbconvert = ">=7.17.1,<8"
opencv = ">=5.0.0,<6"

[target.default.dependencies]
pytorch-gpu = ">=2.10"
torchvision = "*"

[target.cicd.dependencies]
pytorch-cpu = ">=2.10"
torchvision = "*"

[pypi-dependencies]
mcp-pypi = ">=3.0.0, <4"
playwright = ">=1.61.0, <2"
kagglehub = ">=1.0.2, <2"
